<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <title>🟢 HIGHBALL</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
      :root {
        --bg: #0a0a0a;
        --text: #f5f0e8;
        --text-dim: #b8a898;
        --text-faint: #6a6058;
        --coral: #ff7e5f;
        --coral-soft: rgba(255, 126, 95, 0.15);
        --coral-glow: rgba(255, 126, 95, 0.4);
        --gold: #ffd166;
        --teal: #1dd1a1;
        --green: #2ecc71;
        --green-glow: rgba(46, 204, 113, 0.25);
        --amber: #ff9f43;
        --amber-glow: rgba(255, 159, 67, 0.25);
        --red: #ff6b6b;
        --red-glow: rgba(255, 107, 107, 0.25);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }

      /* ─── Tropical Sunset Background ─── */
      .bg-image {
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image: url("./images/1_Dark_palm_trees_silhouettes_on_colorful.png");
        background-size: cover;
        background-position: center 70%;
        background-repeat: no-repeat;
        opacity: 0.22;
        filter: blur(1px) saturate(0.7);
        transform: scale(1.1);
      }

      .bg-overlay {
        position: fixed;
        inset: 0;
        z-index: 1;
        background: radial-gradient(
            ellipse 80% 50% at 50% 0%,
            rgba(255, 126, 95, 0.08) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 60% 40% at 50% 100%,
            rgba(10, 10, 10, 0.9) 0%,
            transparent 70%
          ),
          linear-gradient(
            180deg,
            rgba(6, 6, 6, 0.4) 0%,
            rgba(6, 6, 6, 0.1) 40%,
            rgba(6, 6, 6, 0.5) 100%
          );
        pointer-events: none;
      }

      /* ─── Noise Texture ─── */
      .noise {
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
        background-repeat: repeat;
        background-size: 128px;
        pointer-events: none;
        z-index: 100;
        opacity: 0.6;
      }

      /* ─── Floating Particles (Fireflies) ─── */
      .particle {
        position: fixed;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: var(--gold);
        box-shadow: 0 0 6px var(--gold), 0 0 12px rgba(255, 209, 102, 0.3);
        pointer-events: none;
        z-index: 2;
        opacity: 0;
      }

      .p1 {
        top: 20%;
        left: 15%;
        animation: float 8s ease-in-out infinite;
        animation-delay: 0s;
      }
      .p2 {
        top: 35%;
        left: 80%;
        animation: float 10s ease-in-out infinite;
        animation-delay: 2s;
      }
      .p3 {
        top: 60%;
        left: 25%;
        animation: float 7s ease-in-out infinite;
        animation-delay: 4s;
      }
      .p4 {
        top: 45%;
        left: 70%;
        animation: float 9s ease-in-out infinite;
        animation-delay: 1s;
      }
      .p5 {
        top: 75%;
        left: 60%;
        animation: float 11s ease-in-out infinite;
        animation-delay: 3s;
      }
      .p6 {
        top: 15%;
        left: 55%;
        animation: float 6s ease-in-out infinite;
        animation-delay: 5s;
      }

      @keyframes float {
        0%,
        100% {
          opacity: 0;
          transform: translate(0, 0) scale(0.5);
        }
        20% {
          opacity: 0.8;
        }
        50% {
          opacity: 0.4;
          transform: translate(20px, -30px) scale(1);
        }
        80% {
          opacity: 0.6;
        }
      }

      /* ─── Layout ─── */
      .app {
        position: relative;
        z-index: 3;
        max-width: 430px;
        margin: 0 auto;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        padding: 20px 24px 32px;
      }

      /* ─── Status ─── */
      .status {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding-top: 8px;
        margin-bottom: 8px;
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--text-faint);
        transition: all 0.5s ease;
      }

      .status-dot.live {
        background: var(--teal);
        box-shadow: 0 0 8px var(--green-glow);
        animation: pulse 2.5s ease-in-out infinite;
      }

      .status-dot.offline {
        background: var(--coral);
        box-shadow: 0 0 8px var(--coral-glow);
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }

      .status-text {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--text-faint);
        transition: color 0.5s ease;
      }

      .status-text.live {
        color: var(--teal);
      }
      .status-text.offline {
        color: var(--coral);
      }

      /* ─── Logo ─── */
      .logo-wrap {
        text-align: center;
        margin: 8px 0 28px;
        position: relative;
      }

      .logo-img {
        width: 260px;
        max-width: 100%;
        height: auto;
        display: block;
        margin: 0 auto;
        filter: drop-shadow(0 0 20px var(--coral-glow))
          drop-shadow(0 0 60px rgba(255, 126, 95, 0.15));
        transition: filter 0.5s ease;
      }

      .logo-wrap::after {
        content: "";
        position: absolute;
        bottom: -20px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 40px;
        background: radial-gradient(
          ellipse,
          var(--coral-soft) 0%,
          transparent 70%
        );
        filter: blur(20px);
        pointer-events: none;
      }

      /* ─── Hero: Headcount ─── */
      .hero {
        text-align: center;
        margin-bottom: 32px;
        flex-shrink: 0;
        position: relative;
      }

      .hero-icon {
        font-size: 24px;
        margin-bottom: 8px;
        opacity: 0.6;
        animation: sway 3s ease-in-out infinite;
        display: inline-block;
      }

      @keyframes sway {
        0%,
        100% {
          transform: rotate(-5deg);
        }
        50% {
          transform: rotate(5deg);
        }
      }

      .hero-number {
        font-size: 110px;
        font-weight: 900;
        line-height: 0.9;
        letter-spacing: -6px;
        background: linear-gradient(180deg, #fff8f0 0%, #e8d8c4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        font-variant-numeric: tabular-nums;
      }

      .hero-number.pop {
        transform: scale(1.06);
      }

      .hero-label {
        font-family: "Playfair Display", serif;
        font-size: 14px;
        font-weight: 400;
        font-style: italic;
        color: var(--text-dim);
        letter-spacing: 0.06em;
        margin-top: 10px;
      }

      .hero-max {
        font-size: 11px;
        color: var(--text-faint);
        margin-top: 6px;
        font-weight: 400;
        letter-spacing: 0.05em;
      }

      /* ─── Vibe Emoji ─── */
      .vibe {
        text-align: center;
        margin-bottom: 16px;
        font-size: 28px;
        opacity: 0;
        transform: translateY(10px);
        transition: all 0.5s ease;
      }

      .vibe.show {
        opacity: 0.7;
        transform: translateY(0);
      }

      /* ─── Gauge ─── */
      .gauge-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 24px;
        flex-shrink: 0;
      }

      .gauge-ring-wrap {
        position: relative;
        width: 190px;
        height: 190px;
      }

      .gauge-ring-wrap svg {
        width: 100%;
        height: 100%;
        transform: rotate(-90deg);
      }

      .gauge-track {
        fill: none;
        stroke: rgba(255, 255, 255, 0.05);
        stroke-width: 3;
        stroke-linecap: round;
      }

      .gauge-arc {
        fill: none;
        stroke-width: 3;
        stroke-linecap: round;
        transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1),
          stroke 0.6s ease;
        filter: drop-shadow(0 0 4px var(--gauge-glow, transparent));
      }

      .gauge-inner {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .gauge-pct {
        font-size: 42px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -2px;
        font-variant-numeric: tabular-nums;
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        background: linear-gradient(180deg, #fff8f0 0%, #e8d8c4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .gauge-pct.pop {
        transform: scale(1.12);
      }

      .gauge-pct-suffix {
        font-size: 18px;
        font-weight: 600;
        opacity: 0.4;
        margin-left: 1px;
      }

      .gauge-sublabel {
        font-family: "Playfair Display", serif;
        font-size: 11px;
        color: var(--text-faint);
        font-style: italic;
        letter-spacing: 0.08em;
        margin-top: 4px;
      }

      /* ─── Occupancy Badge ─── */
      .badge {
        margin-top: 14px;
        padding: 6px 16px;
        border-radius: 100px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: all 0.5s ease;
        border: 1px solid transparent;
      }

      .badge.low {
        background: rgba(29, 209, 161, 0.06);
        color: var(--teal);
        border-color: rgba(29, 209, 161, 0.12);
      }

      .badge.medium {
        background: rgba(255, 159, 67, 0.06);
        color: var(--amber);
        border-color: rgba(255, 159, 67, 0.12);
      }

      .badge.high {
        background: rgba(255, 107, 107, 0.06);
        color: var(--red);
        border-color: rgba(255, 107, 107, 0.12);
      }

      /* ─── Divider ─── */
      .divider {
        width: 40px;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 126, 95, 0.3),
          transparent
        );
        margin: 0 auto 20px;
        flex-shrink: 0;
      }

      /* ─── Venue Info ─── */
      .venue {
        text-align: center;
        flex-shrink: 0;
      }

      .venue-address {
        font-family: "Playfair Display", serif;
        font-size: 13px;
        color: var(--text-dim);
        font-weight: 400;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .venue-address svg {
        width: 14px;
        height: 14px;
        stroke: var(--coral);
        opacity: 0.6;
      }

      .hours {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .hours-row {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        font-size: 11px;
      }

      .hours-days {
        color: var(--text-faint);
        font-weight: 500;
        min-width: 70px;
        text-align: right;
        font-family: "Inter", sans-serif;
        letter-spacing: 0.02em;
      }

      .hours-time {
        color: var(--text-dim);
        font-weight: 400;
        min-width: 90px;
        text-align: left;
        font-family: "Inter", sans-serif;
      }

      .hours-time.closed {
        color: var(--coral);
        font-weight: 600;
        opacity: 0.8;
      }

      /* ─── Footer ─── */
      .footer {
        margin-top: auto;
        padding-top: 20px;
        text-align: center;
      }

      .updated {
        font-size: 10px;
        color: var(--text-faint);
        letter-spacing: 0.05em;
      }

      .updated span {
        color: var(--text-dim);
        font-variant-numeric: tabular-nums;
      }

      /* ─── Entrance Animations ─── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .enter {
        opacity: 0;
        animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .d1 {
        animation-delay: 0.05s;
      }
      .d2 {
        animation-delay: 0.15s;
      }
      .d3 {
        animation-delay: 0.3s;
      }
      .d4 {
        animation-delay: 0.45s;
      }
      .d5 {
        animation-delay: 0.6s;
      }
      .d6 {
        animation-delay: 0.75s;
      }
      .d7 {
        animation-delay: 0.9s;
      }

      /* ─── Responsive ─── */
      @media (max-height: 780px) {
        .hero-number {
          font-size: 96px;
          letter-spacing: -4px;
        }
        .gauge-ring-wrap {
          width: 160px;
          height: 160px;
        }
        .gauge-pct {
          font-size: 36px;
        }
        .logo-img {
          width: 220px;
        }
        .hero {
          margin-bottom: 24px;
        }
      }

      @media (max-height: 680px) {
        .hero-number {
          font-size: 80px;
          letter-spacing: -3px;
        }
        .gauge-ring-wrap {
          width: 140px;
          height: 140px;
        }
        .gauge-pct {
          font-size: 30px;
        }
        .logo-img {
          width: 180px;
        }
        .hero {
          margin-bottom: 20px;
        }
        .gauge-section {
          margin-bottom: 16px;
        }
        .vibe {
          font-size: 22px;
        }
      }
    </style>
    <base target="_blank" />
  </head>
  <body>
    <!-- Background Layers -->
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>
    <div class="noise"></div>

    <!-- Floating Particles -->
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
    <div class="particle p4"></div>
    <div class="particle p5"></div>
    <div class="particle p6"></div>

    <div class="app">
      <!-- Status -->
      <div class="status enter d1">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">Connecting</span>
      </div>

      <!-- Logo -->
      <div class="logo-wrap enter d2">
        <img
          src="./IMG_2421.png"
          alt="Highball"
          class="logo-img"
          id="logoImg"
        />
      </div>

      <!-- Headcount -->
      <div class="hero enter d3">
        <div class="hero-icon" id="heroIcon">🌴</div>
        <div class="hero-number" id="headcount">—</div>
        <div class="hero-label">People Inside</div>
        <div class="hero-max">of 300 capacity</div>
      </div>

      <!-- Vibe Emoji -->
      <div class="vibe" id="vibe"></div>

      <!-- Gauge -->
      <div class="gauge-section enter d4">
        <div class="gauge-ring-wrap">
          <svg viewBox="0 0 200 200">
            <defs>
              <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color: #1dd1a1" />
                <stop offset="50%" style="stop-color: #ff9f43" />
                <stop offset="100%" style="stop-color: #ff6b6b" />
              </linearGradient>
            </defs>
            <circle class="gauge-track" cx="100" cy="100" r="88"></circle>
            <circle
              class="gauge-arc"
              id="gaugeArc"
              cx="100"
              cy="100"
              r="88"
              stroke-dasharray="552.9"
              stroke-dashoffset="552.9"
              stroke="url(#gaugeGrad)"
            ></circle>
          </svg>
          <div class="gauge-inner">
            <div class="gauge-pct" id="gaugePct">
              <span id="pctNum">0</span><span class="gauge-pct-suffix">%</span>
            </div>
            <div class="gauge-sublabel">Capacity</div>
          </div>
        </div>
        <div class="badge low" id="badge">Low Traffic</div>
      </div>

      <div class="divider enter d5"></div>

      <!-- Venue Info -->
      <div class="venue enter d5">
        <div class="venue-address">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
            <circle cx="12" cy="10" r="3"></circle>
          </svg>
          75-77 London Circuit
        </div>
        <div class="hours">
          <div class="hours-row">
            <span class="hours-days">Tue — Thu</span>
            <span class="hours-time">5pm — 12am</span>
          </div>
          <div class="hours-row">
            <span class="hours-days">Fri — Sat</span>
            <span class="hours-time">4pm — 3am</span>
          </div>
          <div class="hours-row">
            <span class="hours-days">Sun — Mon</span>
            <span class="hours-time closed">Closed</span>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer enter d6">
        <div class="updated">Updated <span id="updated">—</span></div>
      </div>
    </div>

    <script>
      const MAX_CAP = 300;
      const CIRC = 2 * Math.PI * 88;

      let headcount = 0;
      let percentage = 0;

      const $ = (id) => document.getElementById(id);

      const statusDot = $("statusDot");
      const statusText = $("statusText");
      const headcountEl = $("headcount");
      const heroIcon = $("heroIcon");
      const vibe = $("vibe");
      const gaugeArc = $("gaugeArc");
      const pctNum = $("pctNum");
      const gaugePct = $("gaugePct");
      const badge = $("badge");
      const updated = $("updated");
      const logoImg = $("logoImg");

      firebase.initializeApp({
        databaseURL:
          "https://bar-tracker-mvp-default-rtdb.asia-southeast1.firebasedatabase.app",
      });
      const db = firebase.database();

      function setStatus(state) {
        statusDot.className = "status-dot";
        statusText.className = "status-text";
        if (state === "live") {
          statusDot.classList.add("live");
          statusText.classList.add("live");
          statusText.textContent = "Live";
        } else if (state === "offline") {
          statusDot.classList.add("offline");
          statusText.classList.add("offline");
          statusText.textContent = "Offline";
        } else {
          statusText.textContent = "Connecting";
        }
      }

      function getVibe(pct) {
        if (pct < 20) return { icon: "🌴", emoji: "", text: "Chill vibes" };
        if (pct < 40)
          return { icon: "🍹", emoji: "🍹", text: "Drinks flowing" };
        if (pct < 60)
          return { icon: "🎵", emoji: "🎵", text: "Getting lively" };
        if (pct < 80) return { icon: "💃", emoji: "💃", text: "¡Fiesta!" };
        return { icon: "🔥", emoji: "🔥", text: "¡Loco!" };
      }

      function colorFor(pct) {
        if (pct < 50) return { cls: "low", label: "Low Traffic" };
        if (pct < 80) return { cls: "medium", label: "Getting Busy" };
        return { cls: "high", label: "Near Capacity" };
      }

      function animateNum(el, from, to, dur = 700) {
        const t0 = performance.now();
        function tick(t) {
          const p = Math.min((t - t0) / dur, 1);
          const ease = 1 - Math.pow(1 - p, 4);
          el.textContent = Math.round(from + (to - from) * ease);
          if (p < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }

      function updateHeadcount(val) {
        const old = headcount;
        headcount = val;
        headcountEl.classList.add("pop");
        setTimeout(() => headcountEl.classList.remove("pop"), 400);
        animateNum(headcountEl, old, val);
      }

      function updateGauge(val) {
        const old = percentage;
        percentage = val;

        gaugePct.classList.add("pop");
        setTimeout(() => gaugePct.classList.remove("pop"), 400);
        animateNum(pctNum, old, val);

        const off = CIRC - (val / 100) * CIRC;
        gaugeArc.style.strokeDashoffset = off;

        const c = colorFor(val);
        badge.className = "badge " + c.cls;
        badge.textContent = c.label;

        // Update vibe
        const v = getVibe(val);
        heroIcon.textContent = v.icon;
        if (v.emoji) {
          vibe.textContent = v.emoji + " " + v.text;
          vibe.classList.add("show");
        } else {
          vibe.classList.remove("show");
        }

        // Logo glow intensifies with crowd
        const glowIntensity = 20 + (val / 100) * 40;
        logoImg.style.filter = `drop-shadow(0 0 ${glowIntensity}px var(--coral-glow)) drop-shadow(0 0 ${
          glowIntensity * 3
        }px rgba(255,126,95,0.15))`;
      }

      function setTime() {
        const d = new Date();
        updated.textContent = d.toLocaleTimeString("en-AU", {
          hour12: false,
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      db.ref("venue_metrics/headcount").on(
        "value",
        (snap) => {
          updateHeadcount(snap.val() || 0);
          setTime();
          setStatus("live");
        },
        () => setStatus("offline")
      );

      db.ref("venue_metrics/percentage").on(
        "value",
        (snap) => {
          updateGauge(snap.val() || 0);
          setTime();
          setStatus("live");
        },
        () => setStatus("offline")
      );

      db.ref(".info/connected").on("value", (snap) => {
        setStatus(snap.val() ? "live" : "offline");
      });

      setStatus("connecting");
    </script>
  </body>
</html>
